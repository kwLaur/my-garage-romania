server:
  port: 8080

spring:
  application:
    name: my-garage-romania
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/my_garage_romania}
    username: ${SPRING_DATASOURCE_USERNAME:garage}
    password: ${SPRING_DATASOURCE_PASSWORD:garage}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

app:
  jwt:
    secret: ${APP_JWT_SECRET:change-this-development-secret-change-this-development-secret}
    ttl-minutes: ${APP_JWT_TTL_MINUTES:1440}
  default-user:
    email: ${APP_DEFAULT_USER_EMAIL:admin@garage.local}
    password: ${APP_DEFAULT_USER_PASSWORD:garage123}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  uploads:
    receipts-path: ${APP_UPLOADS_RECEIPTS_PATH:uploads/receipts}
    max-size-bytes: ${APP_UPLOADS_MAX_SIZE_BYTES:5242880}
  integrations:
    cnair:
      enabled: ${APP_INTEGRATIONS_CNAIR_ENABLED:false}
      mode: ${APP_INTEGRATIONS_CNAIR_MODE:MANUAL}
      official-check-url: ${APP_INTEGRATIONS_CNAIR_OFFICIAL_CHECK_URL:https://www.cnadnr.ro/ro/verificare-rovinieta}
      api-base-url: ${APP_INTEGRATIONS_CNAIR_API_BASE_URL:}
    rar-autopass:
      enabled: ${APP_INTEGRATIONS_RAR_AUTOPASS_ENABLED:false}
      mode: ${APP_INTEGRATIONS_RAR_AUTOPASS_MODE:MANUAL}
      official-url: ${APP_INTEGRATIONS_RAR_AUTOPASS_OFFICIAL_URL:https://apps.rarom.ro/autopass-client}
      api-base-url: ${APP_INTEGRATIONS_RAR_AUTOPASS_API_BASE_URL:}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
